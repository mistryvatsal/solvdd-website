<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 180px; height: 180px; overflow: hidden; }
  body {
    background: #16140f;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .slash {
    font-family: ui-monospace, "SF Mono", Menlo, "Courier New", monospace;
    font-size: 108px;
    font-weight: 400;
    color: #f6f4ef;
    line-height: 1;
    /* Slight nudge to optically center the diagonal stroke */
    margin-top: 8px;
  }
</style>
</head>
<body>
  <span class="slash">/</span>
</body>
</html>
