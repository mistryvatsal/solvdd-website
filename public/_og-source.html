<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@1,6..72,400&display=swap" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #f6f4ef;
    color: #16140f;
    font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    padding: 64px 72px;
  }
  .top {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: auto;
  }
  .slash { font-family: "Geist Mono", monospace; font-size: 18px; color: #8a847b; font-weight: 400; }
  .wordmark { font-size: 18px; font-weight: 600; letter-spacing: -0.6px; color: #16140f; }
  .headline {
    font-size: 96px;
    font-weight: 500;
    line-height: 0.94;
    letter-spacing: -3.5px;
    color: #16140f;
    margin-bottom: 48px;
  }
  .headline em {
    font-family: "Newsreader", ui-serif, Georgia, serif;
    font-style: italic;
    font-weight: 400;
    color: #2a2722;
  }
  .ember { color: #c2502a; }
  .rule { width: 100%; height: 1px; background: #e6e1d6; margin-bottom: 24px; }
  .meta {
    display: flex;
    gap: 0;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-right: 48px;
    border-right: 1px solid #e6e1d6;
    margin-right: 48px;
  }
  .meta-item:last-child { border-right: none; margin-right: 0; }
  .meta-label { font-family: "Geist Mono", monospace; font-size: 10px; color: #8a847b; letter-spacing: 1px; text-transform: uppercase; }
  .meta-value { font-size: 15px; color: #16140f; letter-spacing: -0.2px; }
</style>
</head>
<body>
  <div class="top">
    <span class="slash">/</span>
    <span class="wordmark">solvdd</span>
  </div>

  <h1 class="headline">
    Engineering<br>
    <em>systems</em><br>
    that scale<span class="ember">.</span>
  </h1>

  <div class="rule"></div>

  <div class="meta">
    <div class="meta-item">
      <span class="meta-label">Practice</span>
      <span class="meta-value">Backend · Data · AI</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Engagement</span>
      <span class="meta-value">Project · retainer · advisory</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Based</span>
      <span class="meta-value">India · serving globally</span>
    </div>
  </div>
</body>
</html>
